# config/indicators/credit.yaml
# 신용 정보원 — 신호 파라미터 (DEFINITIONS_AND_CONVENTIONS.md 1.2·1.4·5절)
#
# ── 사전 등록 일탈 사유 기록 ──────────────────────────────────────────────────
# DEFINITIONS 5절 템플릿 원래 시리즈: HY OAS(BAMLH0A0HYM2)
# 대체 결정 시리즈: BAA10Y (Moody's Baa − 10Y Treasury 일간 스프레드)
#
# 일탈 사유:
#   등록 신호 HY OAS의 무료 장기 이력이 FRED 2026-04 rolling 3년 윈도우 정책으로
#   소멸하였다. FRED API(등록 키 보유) + ALFRED vintage(realtime_end 소급) 전 경로
#   확인 결과 동일하게 2023-05-30~만 반환(realtime_end=2023-01-01 → "does not exist
#   in ALFRED"). 영구·진행성 제약으로 1996~ 전체 이력 획득 완전 불가.
#   → 가장 순수한 무료 검증가능 대체로 BAA10Y 선택.
#   결과 기반 선택이 아니라 데이터 가용성 기반 불가피 대체.
#
# BAA10Y 선택 근거 (NFCI 대비 우위):
#   목표가 정보원별 영향력의 깨끗한 분리이므로 신용 신호는 최대한 순수해야 한다.
#   NFCI는 합성 금융여건지수로 변동성·위험선호 성분이 혼재 → 독립성 분석 오염 위험.
#   BAA10Y는 단일 신용 스프레드(Baa−10Y)로 순수하며, FRED 무료·1986~·일간·재현 가능.
#   ICE rolling 3년 제약 없음.
#
# BAA10Y 제약 (명시):
#   투자등급 하단(Baa) 스프레드라 HY OAS보다 위기 시 반응 폭이 작다.
#   → 신용 방어 강도가 과소평가될 수 있음.
#   독립성·순수성이 반응 강도보다 우선이므로 수용한다.
#   이 제약은 M3 단독 검증·M4 독립성 분석·M5 결합 보고서에 명시한다.
#
# NFCI·STLFSI4 위치:
#   사전 등록된 보조·대안 신호로 유지. 제거 금지. M1 로드 그대로.
#   독립성 분석(M4)에서 신용 신호와의 상관 측정에 활용.
# ──────────────────────────────────────────────────────────────────────────────

# 대표 신호
series:           "BAA10Y"   # Moody's Baa corporate bond spread vs 10Y Treasury
                             # FRED, 1986-01-02~, 일간, 발표 시차 없음 (HY OAS와 동일 처리)

# 상대화 및 매핑 (DEFINITIONS 1.2·1.4)
# 스트레스 지표 s_t (높을수록 스트레스) → 백분위 p_t → 단조 감소 매핑 → w ∈ [0, w_max]
percentile_window: 252       # 트레일링 252 거래일 백분위 계산 윈도우
map:
  theta_low_pct:  0.5        # p_t < 0.5  → w_max (정상 여건, 풀 노출)
  theta_high_pct: 0.9        # p_t > 0.9  → 0     (극단 스트레스, 완전 방어)
                             # 사이: 선형 보간 (DEFINITIONS 1.4 임계 방식)

# 보조·대안 신호 (사전 등록, 제거 금지)
# aux_series_1: "NFCI"      # Chicago Fed NFCI, 1971~, 주간. 등록 대안 — M4 독립성 분석 활용.
# aux_series_2: "STLFSI4"   # St. Louis Fed FSI, 1993~, 주간. 등록 보조.
# aux_series_3: "BAMLH0A0HYM2"  # HY OAS, 2023-05-30~, 일간. 최근 구간 robustness 전용.
